version: "3.9"

services:
  api:
    build:
      context: .
      target: production
    image: fastapi-k8s-demo:local
    container_name: fastapi_app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Prometheus for local metrics scraping
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
