name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, production]
      image_tag:
        description: Image tag to deploy (default = commit SHA)
        required: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/fastapi-k8s-demo

jobs:
  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false  # never cancel an in-progress deploy
    if: github.ref == 'refs/heads/main' || inputs.environment == 'staging'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag || github.sha }}"
          echo "TAG=${TAG::8}" >> $GITHUB_OUTPUT

      - name: Set up kubeconfig (staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Update image tag in staging overlay
        run: |
          cd k8s/overlays/staging
          # Update the newTag field in kustomization.yaml
          sed -i "s/newTag:.*/newTag: \"${{ steps.tag.outputs.TAG }}\"/" kustomization.yaml

      - name: Dry-run (server-side)
        run: kubectl apply --dry-run=server -k k8s/overlays/staging

      - name: Apply staging overlay
        run: kubectl apply -k k8s/overlays/staging

      - name: Wait for rollout
        run: kubectl rollout status deployment/staging-fastapi-app -n fastapi-staging --timeout=120s

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        run: ./scripts/smoke-test.sh

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Staging deploy FAILED for ${{ github.sha }} — ${{ github.run_url }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Deploy to Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    environment: production        # requires manual approval in GitHub Environments
    needs: deploy-staging
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    if: startsWith(github.ref, 'refs/tags/v') || inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag from git tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag || github.ref_name }}"
          # Strip leading 'v' from semver tags (v1.2.3 → 1.2.3)
          echo "TAG=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up kubeconfig (production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Record current revision (for rollback)
        id: revision
        run: |
          REV=$(kubectl rollout history deployment/fastapi-app -n fastapi-app \
                  --no-headers | tail -1 | awk '{print $1}')
          echo "REVISION=${REV}" >> $GITHUB_OUTPUT

      - name: Update image tag in production overlay
        run: |
          cd k8s/overlays/production
          sed -i "s/newTag:.*/newTag: \"${{ steps.tag.outputs.TAG }}\"/" kustomization.yaml

      - name: Diff before apply
        run: kubectl diff -k k8s/overlays/production || true   # diff exits 1 when changes exist

      - name: Apply production overlay
        run: kubectl apply -k k8s/overlays/production

      - name: Wait for rollout
        run: kubectl rollout status deployment/fastapi-app -n fastapi-app --timeout=180s

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
        run: ./scripts/smoke-test.sh

      - name: Auto-rollback on smoke failure
        if: failure()
        run: |
          echo "Smoke tests failed — rolling back to revision ${{ steps.revision.outputs.REVISION }}"
          kubectl rollout undo deployment/fastapi-app -n fastapi-app \
            --to-revision=${{ steps.revision.outputs.REVISION }}
          kubectl rollout status deployment/fastapi-app -n fastapi-app --timeout=120s

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Production deploy SUCCESS: ${{ steps.tag.outputs.TAG }} — ${{ github.run_url }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "Production deploy FAILED + auto-rolled-back: ${{ steps.tag.outputs.TAG }} — ${{ github.run_url }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
