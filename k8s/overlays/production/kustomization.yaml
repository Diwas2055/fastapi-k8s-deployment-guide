apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: fastapi-app

resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml

images:
  - name: fastapi-k8s-demo
    newTag: "1.0.0"   # Pin exact image tag — never use :latest in prod

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: fastapi-app

configMapGenerator:
  - name: fastapi-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - WORKERS=4
