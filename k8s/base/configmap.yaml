apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: fastapi-app
  labels:
    app.kubernetes.io/name: fastapi-app
    app.kubernetes.io/component: config
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  APP_NAME: "FastAPI K8s Demo"
  APP_VERSION: "1.0.0"
  ENABLE_METRICS: "true"
  WORKERS: "2"
