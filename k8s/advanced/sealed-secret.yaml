# Sealed Secrets — safe to commit; only the in-cluster controller can decrypt.
#
# HOW TO GENERATE:
#   1. Install kubeseal CLI: https://github.com/bitnami-labs/sealed-secrets
#   2. Get the cluster certificate:
#        kubeseal --fetch-cert > pub-cert.pem
#   3. Seal your secret:
#        kubectl create secret generic fastapi-secrets \
#          --from-literal=DATABASE_URL='postgresql://user:pass@db:5432/prod' \
#          --from-literal=SECRET_KEY='your-32-char-key' \
#          --dry-run=client -o yaml \
#          | kubeseal --cert pub-cert.pem --format yaml > k8s/advanced/sealed-secret.yaml
#   4. Commit sealed-secret.yaml — NEVER commit pub-cert.pem or the raw Secret.
#
# The placeholder below is for reference only — replace with your kubeseal output.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fastapi-secrets
  namespace: fastapi-app
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    DATABASE_URL: "<REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE>"
    SECRET_KEY: "<REPLACE_WITH_KUBESEAL_ENCRYPTED_VALUE>"
  template:
    metadata:
      name: fastapi-secrets
      namespace: fastapi-app
    type: Opaque
