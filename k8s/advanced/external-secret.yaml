# External Secrets Operator — syncs secrets from AWS Secrets Manager / GCP / Vault.
# Requires: helm install external-secrets external-secrets/external-secrets -n external-secrets-system
#
# Step 1 — create a ClusterSecretStore (once per cluster):
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # Uses the node's IAM role (IRSA) — no credentials in the manifest
        jwt:
          serviceAccountRef:
            name: fastapi-app-sa
            namespace: fastapi-app
---
# Step 2 — ExternalSecret: pull values from the store into a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fastapi-secrets
  namespace: fastapi-app
spec:
  refreshInterval: 1h       # re-sync from the store every hour

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: fastapi-secrets    # name of the K8s Secret to create/update
    creationPolicy: Owner    # ESO owns the Secret lifecycle

  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: fastapi/production    # AWS Secrets Manager secret name
        property: database_url     # JSON key inside the secret value

    - secretKey: SECRET_KEY
      remoteRef:
        key: fastapi/production
        property: secret_key
