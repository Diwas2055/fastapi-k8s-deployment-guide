{{- if or .Values.secrets.DATABASE_URL .Values.secrets.SECRET_KEY }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fastapi-app.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.DATABASE_URL }}
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  {{- end }}
  {{- if .Values.secrets.SECRET_KEY }}
  SECRET_KEY: {{ .Values.secrets.SECRET_KEY | quote }}
  {{- end }}
{{- end }}
