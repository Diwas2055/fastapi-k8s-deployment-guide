{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fastapi-app.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fastapi-app.fullname" . }}-allow-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fastapi-app.fullname" . }}-allow-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastapi-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
    # Database egress (configure db port in values)
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.dbPort }}
{{- end }}
